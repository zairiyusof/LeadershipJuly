<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRD 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.0/papaparse.min.js"></script>
</head>

<body>
  <div class="page-frame">

    <header>
      <img src="backdrop.png" alt="Dinner Event Banner">
    </header>

    <audio id="bgMusic" preload="auto" playsinline loop>
    <source src="/songpagar.mp3" type="audio/mpeg">
</audio>

    <h1>SELAMAT DATANG KE MDIO LEADERSHIP DINNER FORUM!</h1>
    <p class="description">Welcome to an evening of celebration and meaningful connections. Please find your seat and enjoy the event!</p>

    <div class="search-container">
      <input type="text" id="search-bar" placeholder="Carian No Tentera/Nama...">
      <div class="data-box" id="results-body"></div>
    </div>

    <!-- Countdown Section -->
    <section id="countdown-section" class="countdown-box">
      <h2>⏳ Countdown to Event</h2>
      <div id="countdown">
        <div class="time-box"><span id="days">00</span><p>Days</p></div>
        <div class="time-box"><span id="hours">00</span><p>Hours</p></div>
        <div class="time-box"><span id="minutes">00</span><p>Minutes</p></div>
        <div class="time-box"><span id="seconds">00</span><p>Seconds</p></div>
      </div>
    </section>

    <div class="image-section">
      <h2>ATUR CARA MAJLIS</h2>
      <img src="tentative.png" alt="Event Tentative" class="glowing-border">
    </div>

    <div class="image-section">
      <h2>SEATING PLAN</h2>
      <img src="overall_table.png" alt="Overall Seating Plan" class="glowing-border">
      <img src="photoshoot1.png" alt="Sesi Bergambar 1" class="glowing-border">
      <img src="photoshoot2.png" alt="Sesi Bergambar 2" class="glowing-border">
    </div>
  </div>

<script src="script.js"></script>

</body>
</html>
